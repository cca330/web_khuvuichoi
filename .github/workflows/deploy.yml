name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:


      - name: Go to project
        run: |
          cd /home/user1/Doan
          pwd

      - name: Pull newest code
        run: |
          cd /home/user1/Doan
          git pull origin main

      - name: Build and start Docker
        run: |
          cd /home/user1/Doan
          docker compose up -d --build

      - name: Show running containers
        run: |
          docker ps

      - name: Deploy Finished
        run: |
          echo "=================================="
          echo " Deploy Success "
          echo "=================================="
