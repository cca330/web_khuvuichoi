name: Deploy

on:
  workflow_run:
    workflows:
      - "PHP Docker CI"
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:


      - name: Go to project
        run: |
          cd /home/user1/Doan
          pwd

      - name: Pull newest code
        run: |
          cd /home/user1/Doan
          git pull origin main

      - name: Build and start Docker
        run: |
          cd /home/user1/Doan
          docker compose up -d --build

      - name: Show running containers
        run: |
          docker ps

      - name: Health Check
        run: |
          curl http://localhost:8080

      - name: Check MySQL
        run: |
          docker exec mysql_container mysqladmin ping -h localhost -p123456
      - name: Deploy Finished
        run: |
          echo "=================================="
          echo " Deploy Success "
          echo "=================================="
