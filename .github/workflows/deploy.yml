name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Pull newest code
        run: |
          cd /home/user1/Doan
          git pull origin main

      - name: Rebuild Docker
        run: |
          cd /home/user1/Doan
          docker compose up -d --build

      - name: Show containers
        run: docker ps
