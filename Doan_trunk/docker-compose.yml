services:
  web:
    build: .
    container_name: web_container
    ports:
      - "8080:80"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: dbweb
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
